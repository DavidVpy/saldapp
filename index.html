<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentas a Cobrar — TECH MARKET</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8; --surface: #ffffff; --primary: #1847C8;
      --primary-light: #e8eefb; --danger: #e03131; --danger-light: #fff0f0;
      --success: #2f9e44; --success-light: #ebfbee; --warning: #f08c00;
      --warning-light: #fff8e6; --text: #1a1a2e; --text-muted: #6b7280;
      --border: #e2e8f0; --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── PIN ── */
    #pin-screen {
      position: fixed; inset: 0; background: var(--primary);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 1000; gap: 24px;
    }
    .pin-logo { color: #fff; font-size: 22px; font-weight: 700; text-align: center; }
    .pin-logo span { display: block; font-size: 13px; font-weight: 400; opacity: 0.7; margin-top: 4px; }
    .pin-dots { display: flex; gap: 14px; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); background: transparent; transition: background 0.15s; }
    .pin-dot.filled { background: #fff; border-color: #fff; }
    .pin-error { color: rgba(255,120,120,0.95); font-size: 13px; font-weight: 500; height: 18px; }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
    .pin-btn { height: 72px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; font-family: inherit; font-size: 22px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .pin-btn:active { background: rgba(255,255,255,0.25); }
    .pin-btn.del { font-size: 18px; }
    .pin-btn.empty { border: none; background: transparent; cursor: default; }

    /* ── OVERLAY ── */
    #overlay { position: fixed; inset: 0; z-index: 500; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    #overlay.visible { display: flex; }
    .overlay-blur { position: absolute; inset: 0; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); background: rgba(10,20,60,0.45); }
    .overlay-box { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 14px; background: rgba(255,255,255,0.12); border-radius: 18px; padding: 28px 36px; border: 1px solid rgba(255,255,255,0.2); }
    .overlay-spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .overlay-msg { color: #fff; font-size: 15px; font-weight: 600; }

    /* ── HEADER ── */
    .header { background: var(--primary); padding: 12px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24,71,200,0.3); }
    .header-back { color: #fff; font-size: 26px; cursor: pointer; display: none; background: none; border: none; padding: 0 8px 0 0; line-height: 1; flex-shrink: 0; }
    .header-text { flex: 1; }
    .header-title { color: #fff; font-size: 17px; font-weight: 700; }
    .header-sub { color: rgba(255,255,255,0.7); font-size: 11px; }
    .header-right { text-align: right; flex-shrink: 0; }
    .header-hora { color: #fff; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .header-actualizado { color: rgba(255,255,255,0.65); font-size: 10px; margin-top: 2px; }

    #app { display: none; }

    /* ── SEARCH ── */
    .search-wrap { padding: 16px 16px 8px; }
    .search-box { display: flex; gap: 10px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; align-items: center; box-shadow: var(--shadow); transition: border-color 0.2s; }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box input { flex: 1; border: none; outline: none; font-family: inherit; font-size: 15px; color: var(--text); background: transparent; }
    .search-box input::placeholder { color: var(--text-muted); }
    .btn-clear { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 4px; display: none; line-height: 1; }

    /* ── RESUMEN ── */
    #resumen-wrap { padding: 0 16px 8px; }
    .resumen-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .resumen-titulo { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
    .btn-ocultar { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 4px 10px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
    .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .res-card { background: var(--surface); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1.5px solid var(--border); }
    .res-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .res-valor { font-size: 16px; font-weight: 700; color: var(--text); }
    .res-valor.success { color: var(--success); }
    .res-valor.danger  { color: var(--danger); }
    .res-valor.warning { color: var(--warning); }

    /* ── CONTENT ── */
    .content { padding: 0 16px 32px; }
    .estado-msg { text-align: center; padding: 32px 20px; color: var(--text-muted); font-size: 14px; }
    .estado-msg .icon { font-size: 36px; margin-bottom: 10px; }
    .error-msg { background: var(--danger-light); color: var(--danger); border-radius: var(--radius); padding: 14px 16px; font-size: 14px; font-weight: 500; margin-top: 8px; }

    /* ── LISTA ── */
    .lista-titulo { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin: 8px 0 10px; }
    .cliente-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
    .cliente-item:active { border-color: var(--primary); background: var(--primary-light); }
    .cliente-item-nombre { font-size: 15px; font-weight: 600; color: var(--text); }
    .cliente-item-doc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .cliente-item-total { font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 2px; }
    .cliente-item-arrow { color: var(--primary); font-size: 20px; flex-shrink: 0; }

    /* ── CLIENTE CARD ── */
    .cliente-card { background: var(--primary); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; color: #fff; }
    .cliente-nombre { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .cliente-doc { font-size: 12px; opacity: 0.75; margin-bottom: 4px; }
    .cliente-total-comprado { font-size: 12px; opacity: 0.85; margin-bottom: 14px; }
    .saldo-global-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.8; margin-bottom: 4px; }
    .saldo-global-monto { font-size: 28px; font-weight: 700; }
    .saldo-global-monto.cero { opacity: 0.6; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .badge-pendiente { background: var(--warning-light); color: var(--warning); }
    .badge-mora { background: var(--danger-light); color: var(--danger); }
    .badge-pagado { background: var(--success-light); color: var(--success); }

    .seccion-titulo { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin: 20px 0 10px; }

    /* ── FACTURA ── */
    .factura-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; border: 1.5px solid var(--border); }
    .factura-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; user-select: none; gap: 10px; }
    .factura-header:active { background: #f8fafc; }
    .factura-info { flex: 1; min-width: 0; }
    .factura-numero { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
    .factura-producto { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .factura-producto.sin-producto { color: var(--text-muted); font-style: italic; font-weight: 400; }
    .factura-meta { font-size: 12px; color: var(--text-muted); }
    .factura-derecha { text-align: right; flex-shrink: 0; }
    .factura-saldo { font-size: 15px; font-weight: 700; color: var(--text); }
    .factura-saldo.pagado { color: var(--success); }
    .factura-saldo-total { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .factura-chevron { font-size: 18px; color: var(--text-muted); transition: transform 0.25s; margin-top: 2px; }
    .factura-card.abierta .factura-chevron { transform: rotate(180deg); }
    .cuotas-wrap { display: none; border-top: 1.5px solid var(--border); }
    .factura-card.abierta .cuotas-wrap { display: block; }
    .cuotas-subtitulo { padding: 10px 16px 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); }
    .cuota-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); gap: 8px; }
    .cuota-izq { flex: 1; min-width: 0; }
    .cuota-num { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .cuota-fecha { font-size: 12px; color: var(--text-muted); }
    .cuota-mora { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .cuota-mora.en-mora { background: var(--danger-light); color: var(--danger); }
    .cuota-mora.al-dia  { background: var(--success-light); color: var(--success); }
    .cuota-mora.proximo { background: var(--warning-light); color: var(--warning); }
    .cuota-der { text-align: right; flex-shrink: 0; }
    .cuota-saldo { font-size: 14px; font-weight: 700; color: var(--text); }
    .cuota-saldo.pagada { color: var(--success); font-size: 12px; }
    .cuota-importe { font-size: 11px; color: var(--text-muted); }
    .historial-toggle { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 16px; width: 100%; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-logo">🏪 TECH MARKET<span>Cuentas a Cobrar</span></div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="overlay-blur"></div>
  <div class="overlay-box">
    <div class="overlay-spinner"></div>
    <div class="overlay-msg" id="overlay-msg">Cargando...</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <button class="header-back" id="btnVolver" onclick="volverALista()">‹</button>
    <div class="header-text">
      <div class="header-title" id="headerTitle">Cuentas a Cobrar</div>
      <div class="header-sub">TECH MARKET</div>
    </div>
    <div class="header-right">
      <div class="header-hora" id="headerHora">--:--:--</div>
      <div class="header-actualizado" id="headerActualizado">Actualizado: --</div>
    </div>
  </div>

  <div id="searchWrap" class="search-wrap">
    <div class="search-box">
      <input type="text" id="inputBuscar" placeholder="Filtrar por nombre o documento..." autocomplete="off" />
      <button class="btn-clear" id="btnClear" onclick="limpiarBusqueda()">✕</button>
    </div>
  </div>

  <div id="resumen-wrap"></div>

  <div class="content" id="content">
    <div class="estado-msg"><div class="icon">⏳</div>Cargando lista de clientes...</div>
  </div>
</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbxDHuWjRT0Hp3iZjHK_RiCMqjeNtX6q3Rmsiig6asiHQwo-kWgV7A9gi8FxRnY4tf1d/exec';
  const PIN_CORRECTO = '2011';
  const SESSION_KEY  = 'tm_cuentas_sesion';

  var pinActual = '';
  var todosLosClientes = [];

  // ── RELOJ ────────────────────────────────────────────────────────────────
  function tickReloj() {
    var ahora = new Date();
    var h = String(ahora.getHours()).padStart(2,'0');
    var m = String(ahora.getMinutes()).padStart(2,'0');
    var s = String(ahora.getSeconds()).padStart(2,'0');
    var el = document.getElementById('headerHora');
    if (el) el.textContent = h + ':' + m + ':' + s;
  }
  setInterval(tickReloj, 1000);
  tickReloj();

  // ── SESIÓN (sessionStorage — dura mientras la pestaña esté abierta) ──────
  function sesionActiva() {
    return sessionStorage.getItem(SESSION_KEY) === '1';
  }
  function iniciarSesion() {
    sessionStorage.setItem(SESSION_KEY, '1');
  }

  // ── INICIO ───────────────────────────────────────────────────────────────
  window.addEventListener('load', function() {
    if (sesionActiva()) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarInicial();
    }
  });

  // ── PIN ──────────────────────────────────────────────────────────────────
  function pinPress(n) {
    if (pinActual.length >= 4) return;
    pinActual += n;
    actualizarDots();
    if (pinActual.length === 4) setTimeout(verificarPin, 150);
  }
  function pinDel() {
    pinActual = pinActual.slice(0, -1);
    actualizarDots();
    document.getElementById('pin-error').textContent = '';
  }
  function actualizarDots() {
    for (var i = 0; i < 4; i++)
      document.getElementById('d' + i).classList.toggle('filled', i < pinActual.length);
  }
  function verificarPin() {
    if (pinActual === PIN_CORRECTO) {
      iniciarSesion();
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarInicial();
    } else {
      document.getElementById('pin-error').textContent = 'PIN incorrecto';
      pinActual = '';
      actualizarDots();
    }
  }

  // ── OVERLAY ──────────────────────────────────────────────────────────────
  function mostrarOverlay(msg) {
    document.getElementById('overlay-msg').textContent = msg || 'Cargando...';
    document.getElementById('overlay').classList.add('visible');
  }
  function ocultarOverlay() {
    document.getElementById('overlay').classList.remove('visible');
  }

  // ── API ──────────────────────────────────────────────────────────────────
  function llamarAPI(params, callback) {
    var qs = Object.keys(params).map(function(k) {
      return k + '=' + encodeURIComponent(params[k]);
    }).join('&');
    var cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    var script = document.createElement('script');
    window[cbName] = function(data) {
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
      callback(data);
    };
    script.onerror = function() {
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
      ocultarOverlay();
      mostrarError('Error de conexión. Verificá tu internet.');
    };
    script.src = API + '?' + qs + '&callback=' + cbName;
    document.body.appendChild(script);
  }

  // ── CARGA INICIAL ────────────────────────────────────────────────────────
  function cargarInicial() {
    mostrarOverlay('Cargando datos...');
    var resumenListo = false, clientesListo = false;

    function intentarOcultar() {
      if (resumenListo && clientesListo) ocultarOverlay();
    }

    llamarAPI({ accion: 'resumen' }, function(data) {
      resumenListo = true;
      if (!data.error) renderResumen(data);
      intentarOcultar();
    });

    llamarAPI({ accion: 'listarClientes' }, function(data) {
      clientesListo = true;
      if (!data.error) {
        todosLosClientes = data.clientes;
        renderLista(todosLosClientes);
      } else {
        mostrarError(data.error);
      }
      intentarOcultar();
    });
  }

  // ── BUSCADOR EN TIEMPO REAL ──────────────────────────────────────────────
  document.getElementById('inputBuscar').addEventListener('input', function() {
    var val = this.value.trim();
    document.getElementById('btnClear').style.display = val ? 'block' : 'none';
    var qUp = val.toUpperCase();
    if (!val) { renderLista(todosLosClientes); return; }
    var filtrados = todosLosClientes.filter(function(c) {
      return c.nombre.toUpperCase().indexOf(qUp) !== -1 ||
             c.ruc.toUpperCase().indexOf(qUp) !== -1;
    });
    renderLista(filtrados);
  });

  function limpiarBusqueda() {
    document.getElementById('inputBuscar').value = '';
    document.getElementById('btnClear').style.display = 'none';
    renderLista(todosLosClientes);
    document.getElementById('inputBuscar').focus();
  }

  // ── VER CUENTA ───────────────────────────────────────────────────────────
  function verCuenta(ruc, nombre) {
    mostrarOverlay('Cargando estado de cuenta...');
    document.getElementById('headerTitle').textContent = nombre;
    document.getElementById('btnVolver').style.display = 'block';
    document.getElementById('searchWrap').style.display = 'none';
    document.getElementById('resumen-wrap').style.display = 'none';
    llamarAPI({ accion: 'cuenta', ruc: ruc }, function(data) {
      ocultarOverlay();
      if (data.error) { mostrarError(data.error); return; }
      renderCuenta(data);
    });
  }

  function volverALista() {
    document.getElementById('headerTitle').textContent = 'Cuentas a Cobrar';
    document.getElementById('btnVolver').style.display = 'none';
    document.getElementById('searchWrap').style.display = 'block';
    document.getElementById('resumen-wrap').style.display = 'block';
    document.getElementById('inputBuscar').value = '';
    document.getElementById('btnClear').style.display = 'none';
    renderLista(todosLosClientes);
  }

  // ── RESUMEN ──────────────────────────────────────────────────────────────
  function renderResumen(d) {
    var oculto = sessionStorage.getItem('tm_resumen_oculto') === '1';

    // Fecha actualizado en header
    if (d.fechaGenerado) {
      document.getElementById('headerActualizado').textContent = 'Actualizado: ' + d.fechaGenerado;
    }

    document.getElementById('resumen-wrap').innerHTML =
      '<div style="padding:0 16px 8px">' +
        '<div class="resumen-header">' +
          '<div class="resumen-titulo">Resumen de cartera</div>' +
          '<button class="btn-ocultar" onclick="toggleResumen()">' +
            (oculto ? '▼ Mostrar' : '▲ Ocultar') +
          '</button>' +
        '</div>' +
        '<div id="resumen-body" style="' + (oculto ? 'display:none' : '') + '">' +
          '<div class="resumen-grid">' +
            '<div class="res-card"><div class="res-label">Total cartera</div><div class="res-valor">Gs. ' + fmt(d.totalCartera) + '</div></div>' +
            '<div class="res-card"><div class="res-label">Total cobrado</div><div class="res-valor success">Gs. ' + fmt(d.totalCobrado) + '</div></div>' +
            '<div class="res-card"><div class="res-label">A cobrar</div><div class="res-valor warning">Gs. ' + fmt(d.totalPendiente) + '</div></div>' +
            '<div class="res-card"><div class="res-label">Vencidos</div><div class="res-valor danger">Gs. ' + fmt(d.totalVencido) + '</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function toggleResumen() {
    var body  = document.getElementById('resumen-body');
    var oculto = body.style.display === 'none';
    body.style.display = oculto ? '' : 'none';
    sessionStorage.setItem('tm_resumen_oculto', oculto ? '0' : '1');
    // actualizar texto botón
    var btn = document.querySelector('.btn-ocultar');
    if (btn) btn.textContent = oculto ? '▲ Ocultar' : '▼ Mostrar';
  }

  // ── UTILS ────────────────────────────────────────────────────────────────
  function fmt(n) { return Number(n).toLocaleString('es-PY'); }

  function tipoDoc(ruc) {
    return ruc.indexOf('-') !== -1 ? 'RUC' : 'CI';
  }

  function mostrarError(msg) {
    document.getElementById('content').innerHTML = '<div class="error-msg">⚠️ ' + msg + '</div>';
  }

  // ── RENDER LISTA ─────────────────────────────────────────────────────────
  function renderLista(clientes) {
    if (!clientes || clientes.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="estado-msg"><div class="icon">🔍</div>No se encontraron clientes.</div>';
      return;
    }
    var html = '<div class="lista-titulo">' + clientes.length + ' cliente(s)</div>';
    clientes.forEach(function(c) {
      var re = c.ruc.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var ne = c.nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var tipo = tipoDoc(c.ruc);
      html += '<div class="cliente-item" onclick="verCuenta(\'' + re + '\',\'' + ne + '\')">' +
        '<div>' +
          '<div class="cliente-item-nombre">' + c.nombre + '</div>' +
          '<div class="cliente-item-doc">' + tipo + ': ' + c.ruc + '</div>' +
          '<div class="cliente-item-total">Total comprado: Gs. ' + fmt(c.totalComprado) + '</div>' +
        '</div>' +
        '<div class="cliente-item-arrow">›</div>' +
        '</div>';
    });
    document.getElementById('content').innerHTML = html;
  }

  // ── RENDER CUENTA ─────────────────────────────────────────────────────────
  function renderCuenta(data) {
    var pendientes = data.facturas.filter(function(f) { return f.estado === 'PENDIENTE'; });
    var pagadas    = data.facturas.filter(function(f) { return f.estado === 'PAGADO'; });
    var hayMora    = pendientes.some(function(f) {
      return f.cuotas.some(function(c) { return c.mor > 0 && c.saldo > 0; });
    });
    var badge = data.saldoGlobal === 0
      ? '<span class="badge badge-pagado">✓ Al día</span>'
      : hayMora ? '<span class="badge badge-mora">⚠ En mora</span>'
      : '<span class="badge badge-pendiente">Saldo pendiente</span>';

    var tipo = tipoDoc(data.ruc);
    var html = '<div class="cliente-card">' +
      '<div class="cliente-nombre">' + data.nombre + '</div>' +
      '<div class="cliente-doc">' + tipo + ': ' + data.ruc + '</div>' +
      '<div class="cliente-total-comprado">Total comprado: Gs. ' + fmt(data.totalComprado) + '</div>' +
      badge +
      '<div style="height:10px"></div>' +
      '<div class="saldo-global-label">Saldo total pendiente</div>' +
      '<div class="saldo-global-monto' + (data.saldoGlobal === 0 ? ' cero' : '') + '">Gs. ' + fmt(data.saldoGlobal) + '</div>' +
      '</div>';

    if (pendientes.length > 0) {
      html += '<div class="seccion-titulo">Facturas pendientes (' + pendientes.length + ')</div>';
      pendientes.forEach(function(f, i) { html += renderFactura(f, 'p' + i); });
    }
    if (pagadas.length > 0) {
      html += '<button class="historial-toggle" onclick="toggleHistorial()">' +
        '<span id="hist-icon">▶</span> Ver historial pagado (' + pagadas.length + ')</button>' +
        '<div id="historial-wrap" style="display:none"><div class="seccion-titulo">Historial pagado</div>';
      pagadas.forEach(function(f, i) { html += renderFactura(f, 'h' + i); });
      html += '</div>';
    }
    document.getElementById('content').innerHTML = html;
  }

  function renderFactura(f, id) {
    var prod = f.producto
      ? '<div class="factura-producto">' + f.producto + '</div>'
      : '<div class="factura-producto sin-producto">Sin descripción</div>';
    var pend = f.cuotas.filter(function(c) { return c.saldo > 0; });
    var pag  = f.cuotas.filter(function(c) { return c.saldo === 0; });
    var mora = pend.some(function(c) { return c.mor > 0; });
    var badge = f.estado === 'PAGADO'
      ? '<span class="badge badge-pagado">Pagado</span>'
      : mora ? '<span class="badge badge-mora">En mora</span>'
      : '<span class="badge badge-pendiente">Pendiente</span>';
    var saldoHtml = f.estado === 'PAGADO'
      ? '<div class="factura-saldo pagado">✓ Saldado</div>'
      : '<div class="factura-saldo">Saldo: Gs. ' + fmt(f.totalSaldo) + '</div>' +
        '<div class="factura-saldo-total">Total: Gs. ' + fmt(f.totalImporte) + '</div>';
    var cuotasHtml = '';
    if (pend.length > 0) {
      cuotasHtml += '<div class="cuotas-subtitulo">Cuotas pendientes</div>';
      pend.forEach(function(c) { cuotasHtml += renderCuota(c, false); });
    }
    if (pag.length > 0) {
      cuotasHtml += '<div class="cuotas-subtitulo">Cuotas pagadas</div>';
      pag.forEach(function(c) { cuotasHtml += renderCuota(c, true); });
    }
    return '<div class="factura-card" id="fc-' + id + '">' +
      '<div class="factura-header" onclick="toggleFactura(\'' + id + '\')">' +
        '<div class="factura-info"><div class="factura-numero">' + f.factura + '</div>' + prod +
        '<div class="factura-meta">Fecha: ' + f.fecha + ' · ' + f.moneda + '</div></div>' +
        '<div class="factura-derecha">' + badge + saldoHtml + '</div>' +
        '<div class="factura-chevron">⌄</div>' +
      '</div>' +
      '<div class="cuotas-wrap">' + cuotasHtml + '</div>' +
      '</div>';
  }

  function renderCuota(c, pagada) {
    var moraHtml = pagada
      ? '<span class="cuota-mora al-dia">✓ Pagada</span>'
      : c.mor > 0  ? '<span class="cuota-mora en-mora">⚠ ' + c.mor + ' días mora</span>'
      : c.mor >= -7 ? '<span class="cuota-mora proximo">Vence en ' + Math.abs(c.mor) + ' días</span>'
      : '<span class="cuota-mora al-dia">Vence ' + c.venc + '</span>';
    var saldoHtml = pagada
      ? '<div class="cuota-saldo pagada">Gs. ' + fmt(c.importe) + '</div>'
      : '<div class="cuota-saldo">Gs. ' + fmt(c.saldo) + '</div>';
    return '<div class="cuota-row">' +
      '<div class="cuota-izq"><div class="cuota-num">Cuota ' + c.cta + '</div>' +
      '<div class="cuota-fecha">Venc: ' + c.venc + '</div></div>' +
      moraHtml +
      '<div class="cuota-der">' + saldoHtml +
      '<div class="cuota-importe">Importe: Gs. ' + fmt(c.importe) + '</div></div>' +
      '</div>';
  }

  function toggleFactura(id) { document.getElementById('fc-' + id).classList.toggle('abierta'); }

  function toggleHistorial() {
    var w = document.getElementById('historial-wrap');
    var i = document.getElementById('hist-icon');
    var v = w.style.display !== 'none';
    w.style.display = v ? 'none' : 'block';
    i.textContent = v ? '▶' : '▼';
  }
</script>
</body>
</html>
